# ==========================
# ===  General settings  ===
# ==========================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g buffer-limit 20

# Change prefix key to C-Space
unbind C-b
set -g prefix C-Space

# Set parent terminal title to reflect current window in tmux session
set -g set-titles on
set -g set-titles-string "#I:#W"

# Start index of window/pane with 1, because we're humans, not computers
set -g base-index 1
setw -g pane-base-index 1

# Enable mouse support
set -g mouse on

set -g detach-on-destroy off     # don't exit tmux when closing a session
set -g escape-time 0             # no delay after escape (for nvim)
set -g focus-events on           # nvim autoread and focus detection
set -g history-limit 1000000     # increase scrollback (default 2000)
set -g renumber-windows on       # renumber windows when any is closed
set -g set-clipboard on          # system clipboard integration
set -g allow-passthrough on      # let OSC sequences reach outer terminal (notifications over SSH)
setw -g mode-keys vi             # vim-style copy mode

# ==========================
# ===   Key bindings     ===
# ==========================

# Reload tmux configuration
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# New window retaining cwd
bind c new-window -c "#{pane_current_path}"

# Intuitive split panes (| = vertical divider, - = horizontal divider), retain cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode (vim-style)
bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

# =====================================
# ===    Appearence and status bar  ===
# ======================================

# general status bar settings
set -g status on
set -g status-position top
set -g status-justify left

# =====================================
# ===        Renew environment      ===
# =====================================
set -g update-environment \
  "DISPLAY\
  SSH_ASKPASS\
  SSH_AUTH_SOCK\
  SSH_AGENT_PID\
  SSH_CONNECTION\
  SSH_TTY\
  WINDOWID\
  XAUTHORITY"

bind '$' run "~/.tmux/renew_env.sh"

# ==========================
# ===   Remote config    ===
# ==========================

# Session is considered to be remote when we ssh into host
if-shell 'test -n "$SSH_CLIENT"' \
     'source-file ~/.tmux/tmux.remote.conf'

# ============================
# ===       Plugins        ===
# ============================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'catppuccin/tmux'

# Session restore
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# fzf-url
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# Theme settings
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag,(),}"
set -g @catppuccin_window_text " #W"

# Run all plugins' scripts (before status bar so catppuccin variables are available)
run '~/.tmux/plugins/tpm/tpm'

# Status bar: session on left, directory + date/time on right
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
